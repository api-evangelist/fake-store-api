      - name: updatecart
        method: PATCH
        description: Partially update a cart
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletecart
        method: DELETE
        description: Delete a cart
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: fake-store-carts-rest
    port: 8080
    description: REST adapter for Fake Store API — Carts. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/carts
      name: carts
      description: REST surface for carts.
      operations:
      - method: GET
        name: listcarts
        description: List carts
        call: fake-store-carts.listcarts
        with:
          startdate: rest.startdate
          enddate: rest.enddate
        outputParameters:
        - type: object
          mapping: $.
