    resources:
    - name: carts
      path: /carts
      operations:
      - name: listcarts
        method: GET
        description: List carts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: startdate
          in: query
          type: string
          description: Start date for filtering carts
        - name: enddate
          in: query
          type: string
          description: End date for filtering carts
      - name: createcart
        method: POST
        description: Create a cart
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
