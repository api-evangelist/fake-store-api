      name: products
      description: REST surface for products.
      operations:
      - method: GET
        name: listproducts
        description: List products
        call: fake-store-products.listproducts
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createproduct
        description: Create a product
