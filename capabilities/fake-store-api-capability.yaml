naftiko: 1.0.0-alpha2
info:
  label: Fake Store API
  description: Fake Store API exposes a sample REST API for e-commerce data including products, carts, users, and authentication.
    It is intended for prototyping, teaching, and integration testing — write operations return fabricated responses and do
    not persist data on the server.
  tags:
  - Fake
  - Store
  - Api
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
